name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  # ─── CLI Release ───────────────────────────────────────
  release-cli:
    name: Release CLI
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Package tarball
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'
          generate_release_notes: true

  # ─── Desktop Release ───────────────────────────────────
  release-desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-windows-2025
            build-flag: --win
          - os: macos-latest
            build-flag: --mac
          - os: ubuntu-latest
            build-flag: --linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 1. Build CLI first (desktop app bundles it via extraResources)
      - name: Install CLI dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      # 2. Build Desktop app
      - name: Install Desktop dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Build Desktop (electron-vite)
        working-directory: desktop-app
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          NOCODE_SPOTIFY_CLOUD_NAME: ${{ secrets.NOCODE_SPOTIFY_CLOUD_NAME }}
          NOCODE_SPOTIFY_TOKEN: ${{ secrets.NOCODE_SPOTIFY_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ACOUSTID_API_KEY: ${{ secrets.ACOUSTID_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
        run: npm run build

      # 3. Package with electron-builder
      - name: Package Desktop
        working-directory: desktop-app
        run: npx electron-builder ${{ matrix.build-flag }} --publish never

      # 4. Upload installers to the release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-app/dist/*.exe
            desktop-app/dist/*.dmg
            desktop-app/dist/*.AppImage
            desktop-app/dist/*.deb
            desktop-app/dist/*.zip
            desktop-app/dist/*.tar.gz
